<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>for you 🤍</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff0f5, #ffe4ec);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      animation: fade 0.8s ease;
    }

    .fox {
      width: 110px;
      margin-bottom: 15px;
      animation: float 2.5s infinite;
    }

    h2 {
      color: #ff6b81;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      margin: 12px 0;
      line-height: 1.5;
    }

    button {
      margin-top: 15px;
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      background: #ff9aa2;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="card" id="app"></div>

<script>

const fox = '<img class="fox" src="https://media.tenor.com/3J8uY9bKxQ0AAAAC/cute-fox.gif" />';

function start() {
  app.innerHTML = `
    ${fox}
    <h2>hey… 🥺</h2>
    <p>I know you’re not feeling okay right now</p>
    <p>so I just made this for you…</p>

    <button onclick="next1()">okay…</button>
  `;
}

function next1() {
  app.innerHTML = `
    ${fox}
    <p>you don’t have to fix anything right now</p>
    <p>you don’t have to be strong</p>
    <p>you don’t have to figure it all out</p>

    <button onclick="next2()">hmm…</button>
  `;
}

function next2() {
  app.innerHTML = `
    ${fox}
    <p>just be like this for a bit</p>
    <p>even if it feels heavy</p>
    <p>that’s okay too 🤍</p>

    <button onclick="next3()">okay…</button>
  `;
}

function next3() {
  app.innerHTML = `
    ${fox}
    <p>I wish I could just sit next to you quietly</p>
    <p>and make this feel a little easier</p>

    <button onclick="next4()">stay…</button>
  `;
}

function next4() {
  app.innerHTML = `
    ${fox}
    <p>you’re not alone in this</p>
    <p>I’m right here 🤍</p>
  `;
}

start();

</script>

</body>
</html>
